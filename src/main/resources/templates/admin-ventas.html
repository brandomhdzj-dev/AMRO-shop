<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ventas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: #333; }
        .btn { padding: 10px 20px; background: #1a1a2e; color: white; text-decoration: none; border-radius: 5px; }
        .btn:hover { background: #16213e; }
        .btn-volver { background: #6c757d; }
        .container { max-width: 1000px; margin: 0 auto; }
        .resumen { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .resumen-card { background: white; border-radius: 8px; padding: 25px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .resumen-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .resumen-valor { font-size: 28px; font-weight: bold; margin-top: 10px; }
        .resumen-valor.ingreso { color: #28a745; }
        .resumen-valor.invertido { color: #dc3545; }
        .resumen-valor.ganancia { color: #007bff; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #1a1a2e; color: white; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-tab { padding: 10px 20px; background: white; color: #333; text-decoration: none; border-radius: 5px; font-size: 14px; }
        .nav-tab.activo { background: #1a1a2e; color: white; }
        .sin-ventas { text-align: center; padding: 40px; color: #999; background: white; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Historial de Ventas</h1>
            <div>
                <a th:href="@{/admin/dashboard}" class="btn btn-volver">Volver al panel</a>
            </div>
        </div>

        <div class="nav-tabs">
            <a th:href="@{/admin/pedidos}" class="nav-tab">Pendientes</a>
            <a th:href="@{/admin/pedidos/vendidos}" class="nav-tab activo">Vendidos</a>
        </div>

        <div class="resumen">
            <div class="resumen-card">
                <p class="resumen-label">Total Vendido</p>
                <p class="resumen-valor ingreso" th:text="'$' + ${totalGanado}"></p>
            </div>
            <div class="resumen-card">
                <p class="resumen-label">Total Invertido</p>
                <p class="resumen-valor invertido" th:text="'$' + ${totalInvertido}"></p>
            </div>
            <div class="resumen-card">
                <p class="resumen-label">Ganancia Neta</p>
                <p class="resumen-valor ganancia" th:text="'$' + ${gananciaTotal}"></p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(pedidos)}" class="sin-ventas">
            <h2>No hay ventas registradas</h2>
        </div>

        <table th:if="${!#lists.isEmpty(pedidos)}">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Talla</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Costo</th>
                    <th>Ganancia</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pedido : ${pedidos}">
                    <td th:text="${pedido.nombreProducto}"></td>
                    <td th:text="${pedido.talla}"></td>
                    <td th:text="${pedido.cantidad}"></td>
                    <td th:text="'$' + ${pedido.total}"></td>
                    <td th:text="'$' + ${pedido.costo * pedido.cantidad}"></td>
                    <td th:text="'$' + ${pedido.ganancia}"></td>
                    <td th:text="${pedido.fecha}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
