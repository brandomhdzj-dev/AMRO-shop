<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AMRO Shop - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #111; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-container { background: white; padding: 50px 40px; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.5); width: 400px; text-align: center; }
        .logo { font-size: 42px; font-weight: bold; letter-spacing: 5px; color: #111; margin-bottom: 5px; }
        .shop { font-size: 13px; color: #888; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 35px; }
        .divider { display: flex; align-items: center; margin: 25px 0; }
        .divider-line { flex: 1; height: 1px; background: #ddd; }
        .divider-text { padding: 0 15px; color: #999; font-size: 13px; }
        .btn-social { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; font-weight: 500; color: #333; transition: all 0.2s; margin-bottom: 12px; text-decoration: none; }
        .btn-social:hover { background: #f8f8f8; border-color: #ccc; }
        .btn-google { color: #333; }
        .btn-facebook { background: #1877f2; color: white; border-color: #1877f2; }
        .btn-facebook:hover { background: #166fe5; border-color: #166fe5; }
        .btn-social svg { width: 22px; height: 22px; }
        .btn-admin { display: block; width: 100%; padding: 14px; margin-top: 20px; background: #111; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; }
        .btn-admin:hover { background: #333; }
        .volver { margin-top: 25px; }
        .volver a { color: #666; text-decoration: none; font-size: 13px; }
        .volver a:hover { color: #111; }
        .error-msg { background: #fee; color: #c00; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">AMRO</div>
        <div class="shop">Shop</div>

        <div th:if="${param.error}" class="error-msg">
            Hubo un error. Intenta de nuevo.
        </div>

        <a href="/oauth2/authorization/google" class="btn-social btn-google">
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuar con Google
        </a>

        <a href="/oauth2/authorization/facebook" class="btn-social btn-facebook">
            <svg viewBox="0 0 24 24" fill="white">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.046V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Continuar con Facebook
        </a>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">o acceso Admin</span>
            <div class="divider-line"></div>
        </div>

        <a th:href="@{/admin}" class="btn-admin">Entrar como Admin</a>

        <div class="volver">
            <a th:href="@{/}">← Volver a la tienda</a>
        </div>
    </div>
</body>
</html>
